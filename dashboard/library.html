<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TubeStack — Library</title>
    <link rel="icon" type="image/png" href="../icons/logo.png" />
    <link rel="stylesheet" href="library.css" />
  </head>
  <body>
    <main class="library-page">
      <header class="library-top">
        <h1>Library</h1>
        <a class="back-btn" href="../home/home.html">Go to Playlist Home</a>
      </header>

      <section class="library-playlists-panel" aria-label="Saved playlists">
        <div class="library-playlists-head">
          <div class="library-playlists-title-row">
            <button
              type="button"
              id="libPlaylistPanelToggle"
              class="lib-playlist-panel-toggle"
              aria-expanded="true"
              aria-controls="libPlaylistPanelBody"
            >
              <span class="lib-playlist-caret" aria-hidden="true"></span>
              <span class="sr-only">Show or hide saved playlists</span>
            </button>
            <h2 class="library-playlists-title">Saved playlists</h2>
          </div>
          <div class="library-origin-toggle" role="group" aria-label="Playlist origin">
            <button type="button" class="lib-origin-btn active" id="libOriginRecent" data-origin="recent">
              Recent sessions
            </button>
            <button type="button" class="lib-origin-btn" id="libOriginImported" data-origin="imported">
              All imported (YouTube)
            </button>
          </div>
        </div>
        <div id="libPlaylistPanelBody" class="library-playlists-body">
          <p class="library-playlists-hint hidden" id="libOriginHint"></p>
          <div id="libraryPlaylistChips" class="library-playlist-chips"></div>
        </div>
      </section>

      <div class="library-columns-head">
        <div class="library-head-cell">
          <span>Artist (YouTube channel)</span>
          <select id="artistSortOrder" class="library-sort-select" aria-label="Sort artists alphabetically">
            <option value="asc" selected>A to Z</option>
            <option value="desc">Z to A</option>
          </select>
        </div>
        <div class="library-head-cell">
          <span>Album (from tags)</span>
          <select id="albumSortOrder" class="library-sort-select" aria-label="Sort albums alphabetically">
            <option value="asc" selected>A to Z</option>
            <option value="desc">Z to A</option>
          </select>
        </div>
        <div class="library-head-cell">
          <span>Category</span>
          <select id="categorySortOrder" class="library-sort-select" aria-label="Sort categories alphabetically">
            <option value="asc" selected>A to Z</option>
            <option value="desc">Z to A</option>
          </select>
        </div>
      </div>

      <div class="library-columns-body">
        <section class="library-col">
          <div id="artistList" class="library-scroll"></div>
        </section>
        <section class="library-col">
          <div id="albumList" class="library-scroll"></div>
        </section>
        <section class="library-col">
          <div id="categoryList" class="library-scroll"></div>
        </section>
      </div>

      <section class="library-controls" aria-label="Library controls">
        <label class="library-search-wrap">
          <span class="sr-only">Search videos</span>
          <input type="search" id="libSearch" placeholder="Search title, creator, album, category, tag…" autocomplete="off" />
        </label>
        <div class="library-controls-grid">
          <div class="lib-control">
            <span class="lib-control-label">View</span>
            <select id="libViewMode">
              <option value="list">List</option>
              <option value="details" selected>Details</option>
              <option value="grid">Grid</option>
            </select>
          </div>
          <div class="lib-control">
            <span class="lib-control-label">Sort</span>
            <select id="libQuickSort">
              <option value="saved_desc">Recently saved</option>
              <option value="title_asc">Title (A-Z)</option>
              <option value="creator_asc">Creator (A-Z)</option>
              <option value="duration_desc">Length (longest)</option>
              <option value="duration_asc">Length (shortest)</option>
              <option value="category_asc">Category (A-Z)</option>
            </select>
          </div>
          <div class="lib-control">
            <span class="lib-control-label">List</span>
            <select id="libListFilter"></select>
          </div>
          <div class="lib-control lib-priority-control">
            <span class="lib-control-label">Priority</span>
            <div id="libPriorityBar" class="lib-priority-bar" role="group" aria-label="Filter by priority"></div>
          </div>
        </div>
      </section>

      <section class="library-videos">
        <div class="lib-videos-head">
          <div id="libDefaultVideoTitle" class="lib-default-video-title">
            <h2 id="videosTitle">Saved videos</h2>
          </div>
          <div id="libFacetVideoHead" class="lib-facet-video-head hidden">
            <div class="lib-facet-video-row">
              <div class="lib-facet-video-text">
                <span id="libFacetName" class="lib-facet-name"></span>
                <span id="libFacetInlineCount" class="lib-facet-inline-count"></span>
              </div>
              <button
                type="button"
                id="libFacetDeleteAll"
                class="lib-facet-delete-all"
                title="Remove every video in this list from your library"
              >
                Delete list
              </button>
            </div>
          </div>
          <div id="libBulkBar" class="lib-bulk-bar hidden" role="region" aria-label="Bulk actions for checked videos">
            <label class="lib-bulk-all"
              ><input type="checkbox" id="libBulkSelectAll" /> <span>All</span></label
            >
            <span id="libBulkSummary" class="lib-bulk-summary"></span>
            <button type="button" id="libBulkDeleteSelected" class="lib-bulk-btn lib-bulk-danger">Delete</button>
            <select id="libBulkPlaylistSelect" class="lib-bulk-select" aria-label="Playlist to add to">
              <option value="">Move to…</option>
            </select>
            <button type="button" id="libBulkMoveBtn" class="lib-bulk-btn">Move</button>
            <button type="button" id="libBulkNewPlBtn" class="lib-bulk-btn lib-bulk-primary">New playlist</button>
          </div>
        </div>
        <div id="videosList" class="videos-scroll"></div>
      </section>
    </main>
    <script src="library.js"></script>
  </body>
  </html>
