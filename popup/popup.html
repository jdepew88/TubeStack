<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TubeStack</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="hdr">
      <div class="hdr-top">
        <img src="../icons/logo.png" alt="" class="hdr-logo" width="36" height="36" />
        <h1>TubeStack</h1>
      </div>
      <p class="sub">Save YouTube watch tabs to your library — pick a scope below.</p>
    </header>
    <section class="panel">
      <p id="libraryLine" class="library"></p>
      <p id="countLine" class="count">Checking tabs…</p>
      <div class="save-stack" role="group" aria-label="Save YouTube tabs">
        <button type="button" id="btnSaveAll" class="btn" disabled>Save all watch tabs</button>
        <button type="button" id="btnSaveExcept" class="btn" disabled title="Every YouTube watch tab in this window except the active tab.">
          Save all except current
        </button>
        <button type="button" id="btnSaveLeft" class="btn btn-dir btn-dir--left" disabled>
          <span class="btn-dir-arrow" aria-hidden="true">←</span>
          <span class="btn-dir-text">Save all to the left</span>
        </button>
        <button type="button" id="btnSaveRight" class="btn btn-dir btn-dir--right" disabled>
          <span class="btn-dir-text">Save all to the right</span>
          <span class="btn-dir-arrow" aria-hidden="true">→</span>
        </button>
      </div>
      <p id="status" class="status" role="status"></p>
    </section>
    <footer class="ftr">
      <button type="button" id="btnHome" class="btn ghost">Playlist home</button>
      <button type="button" id="btnLibrary" class="btn ghost">Library</button>
      <button type="button" id="btnDash" class="btn ghost">Open playlist</button>
    </footer>
    <script src="popup.js" type="module"></script>
  </body>
</html>
