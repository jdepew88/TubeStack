<!DOCTYPE html>
<html lang="en" data-theme="zinc">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TubeStack — Sidebar</title>
    <link rel="stylesheet" href="../lib/ui-themes.css" />
    <link rel="stylesheet" href="sidebar.css" />
  </head>
  <body>
    <header class="hdr">
      <div class="hdr-row">
        <img src="../icons/logo.png" alt="" class="hdr-logo" width="22" height="22" />
        <span class="brand">TubeStack</span>
        <span id="tabBadge" class="badge" hidden>0</span>
      </div>
    </header>

    <section class="panel">
      <label class="field-label" for="playlistSelect">Queue</label>
      <select id="playlistSelect" class="select" disabled aria-label="Queue"></select>

      <div class="actions">
        <button type="button" id="btnAddTabs" class="btn primary" disabled>
          Add window tabs
        </button>
        <button type="button" id="btnNewQueue" class="btn subtle" disabled title="Save tabs into a new queue">
          New queue
        </button>
      </div>
      <p id="countLine" class="hint">Checking tabs…</p>

      <p id="playlistName" class="queue-title" hidden></p>

      <div id="playbackBar" class="playback-bar" hidden>
        <button type="button" id="btnPlayAll" class="btn primary playback-main" disabled>
          <span class="playback-label">Continue playing</span>
          <span class="playback-sub">Play all in order</span>
        </button>
        <button
          type="button"
          id="btnShuffle"
          class="btn playback-shuffle"
          disabled
          title="Shuffle and play"
          aria-label="Shuffle and play"
        >
          Shuffle
        </button>
      </div>

      <ul id="videoList" class="video-list" hidden></ul>
      <p id="emptyState" class="empty">Select a queue or add tabs to get started.</p>
      <p id="status" class="status" role="status"></p>
    </section>

    <footer class="ftr">
      <button type="button" id="btnFull" class="btn linkish">Open full dashboard</button>
      <p class="ftr-privacy">
        <a href="../privacy/privacy.html" target="_blank" rel="noopener noreferrer">Privacy</a>
      </p>
    </footer>

    <script src="../lib/ui-themes.js"></script>
    <script src="sidebar.js" type="module"></script>
  </body>
</html>
